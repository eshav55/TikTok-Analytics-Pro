name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          # Pull latest changes from Hugging Face first
          git pull https://eshavijay:$HF_TOKEN@huggingface.co/spaces/eshavijay/tiktok-analytics-pro main --rebase || true
          # Then push
          git push https://eshavijay:$HF_TOKEN@huggingface.co/spaces/eshavijay/tiktok-analytics-pro main
